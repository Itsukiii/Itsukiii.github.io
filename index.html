<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itsuki Home</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      border-bottom: 1px solid var(--border);
      background: #010409;
    }

    .nav {
      max-width: 960px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      color: #f0f6fc;
    }

    .nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 18px;
      font-size: 14px;
    }

    .nav a:hover {
      color: var(--accent);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    .hero {
      margin-bottom: 42px;
    }

    .tag {
      color: var(--green);
      font-size: 14px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.05;
      color: #f0f6fc;
    }

    .desc {
      max-width: 640px;
      font-size: 18px;
      line-height: 1.8;
      color: var(--muted);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }

    .card {
      display: block;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      text-decoration: none;
      color: var(--text);
      transition: 0.18s ease;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #f0f6fc;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    code {
      color: var(--accent);
      background: rgba(88, 166, 255, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <header>
    <nav class="nav">
      <div class="logo">Itsuki Home</div>
      <div>
        <a href="https://github.com/itsukiii">GitHub</a>
        <a href="https://wiki.itsuki.world">Wiki</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="tag">home.itsuki.world</div>
      <h1>Hi, I’m Itsuki.</h1>
      <p class="desc">
        这里是我的个人主页。用于整理项目、笔记、工具和一些正在慢慢生长的小东西。
      </p>
    </section>

    <section class="cards">
      <a class="card" href="https://wiki.itsuki.world">
        <h2>Wiki</h2>
        <p>知识库、笔记、文档和一些长期整理的内容。</p>
      </a>

      <a class="card" href="https://github.com/itsukiii">
        <h2>GitHub</h2>
        <p>代码仓库、实验项目和开源相关内容。</p>
      </a>

      <a class="card" href="#">
        <h2>Projects</h2>
        <p>之后可以放一些个人项目、小工具或者技术记录。</p>
      </a>
    </section>
  </main>

  <footer>
    Built with <code>GitHub Pages</code> · Hosted at <code>home.itsuki.world</code>
  </footer>
</body>
</html>
